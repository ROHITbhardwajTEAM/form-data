[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Simple redirect — does NOT replace original query string
# event.rawUrl gives correct pathname, event.queryStringParameters gives decoded params
[[redirects]]
  from = "/ccare-api/*"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
