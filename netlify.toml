[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# Pass the API endpoint path as a query param _path=:splat
# This avoids all event.path / event.rawUrl ambiguity
[[redirects]]
  from = "/ccare-api/*"
  to = "/.netlify/functions/proxy?_path=:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
