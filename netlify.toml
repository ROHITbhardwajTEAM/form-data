[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# Edge function intercepts /ccare-api/* BEFORE any redirect
# It runs on Deno at CDN edge — has direct access to original Request URL
[[edge_functions]]
  path = "/ccare-api/*"
  function = "ccare-proxy"

# SPA fallback — React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
