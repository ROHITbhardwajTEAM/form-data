[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/ccare-api/*"
  to = "https://mobileapp.c-care.mu:14443/API/API/APIdigitalregistration/:splat"
  status = 200
  force = true
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
