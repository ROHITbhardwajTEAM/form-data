[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# Route ALL /ccare-api/* calls to the proxy serverless function
# The function reads event.rawUrl to get the exact original path + query string
[[redirects]]
  from = "/ccare-api/*"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true

# SPA fallback — React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
