[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Pass the API sub-path as ?_path=:splat — avoids event.path/rawUrl ambiguity
[[redirects]]
  from = "/ccare-api/*"
  to = "/.netlify/functions/proxy?_path=:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
