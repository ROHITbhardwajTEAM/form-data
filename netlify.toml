[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# Route ALL /ccare-api/* to the proxy function
# Function uses event.rawUrl internally to determine the correct backend path
[[redirects]]
  from = "/ccare-api/*"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
