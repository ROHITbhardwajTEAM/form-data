[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy all /ccare-api/* calls through the serverless function
[[redirects]]
  from = "/ccare-api/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
